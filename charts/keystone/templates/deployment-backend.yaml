apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keystone.fullname" . }}-backend
  labels:
    {{- include "keystone.labels" . | nindent 4 }}
    {{- include "keystone.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "keystone.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keystone.backend.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            # Compose DATABASE_URL from ConfigMap + Secret values
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "keystone.fullname" . }}-secret
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keystone.fullname" . }}-secret
                  key: DATABASE_PASSWORD
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "keystone.fullname" . }}-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "keystone.fullname" . }}-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "keystone.fullname" . }}-config
                  key: DATABASE_NAME
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
            - name: DATABASE_URL_SYNC
              value: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keystone.fullname" . }}-secret
                  key: REDIS_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "keystone.fullname" . }}-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "keystone.fullname" . }}-config
                  key: REDIS_PORT
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "keystone.fullname" . }}-secret
                  key: SECRET_KEY
            - name: ENV_MODE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "keystone.fullname" . }}-config
                  key: ENV_MODE
            - name: SIM_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ include "keystone.fullname" . }}-config
                  key: SIM_ENABLED
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "keystone.fullname" . }}-config
                  key: CORS_ORIGINS
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
