apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keystone.fullname" . }}-secret
  labels:
    {{- include "keystone.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ .Values.secretKey | b64enc | quote }}
  DATABASE_USER: {{ .Values.database.user | b64enc | quote }}
  DATABASE_PASSWORD: {{ .Values.database.password | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.redis.password | b64enc | quote }}
