# =============================================================================
# KEYSTONE — CI / DAST Ephemeral Compose
# Uses pre-built images via environment variables.
# Hardened per DoD Container Hardening Guide.
# =============================================================================
#
# Usage:
#   BACKEND_IMAGE=ghcr.io/keystone/backend:sha-abc123 \
#   FRONTEND_IMAGE=ghcr.io/keystone/frontend:sha-abc123 \
#   docker compose -f docker-compose.ci.yml up -d
#

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with PostGIS (test instance)
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: keystone_test
      POSTGRES_USER: keystone_test
      POSTGRES_PASSWORD: keystone_ci_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystone_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
      - /var/lib/postgresql/data

  # ---------------------------------------------------------------------------
  # Redis (test instance)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /data

  # ---------------------------------------------------------------------------
  # Backend API (pre-built image)
  # ---------------------------------------------------------------------------
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set}
    user: "1001:1001"
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://keystone_test:keystone_ci_password@db:5432/keystone_test
      DATABASE_URL_SYNC: postgresql://keystone_test:keystone_ci_password@db:5432/keystone_test
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ci-ephemeral-secret-not-for-production
      CORS_ORIGINS: '["http://localhost:8080"]'
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Celery Worker (pre-built image)
  # ---------------------------------------------------------------------------
  celery_worker:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set}
    user: "1001:1001"
    environment:
      DATABASE_URL: postgresql+asyncpg://keystone_test:keystone_ci_password@db:5432/keystone_test
      DATABASE_URL_SYNC: postgresql://keystone_test:keystone_ci_password@db:5432/keystone_test
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ci-ephemeral-secret-not-for-production
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: ["celery", "-A", "app.tasks:celery_app", "worker", "--loglevel=info"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks:celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Frontend (pre-built image)
  # ---------------------------------------------------------------------------
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE must be set}
    ports: ["8080:8080"]
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fkL", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
