# =============================================================================
# KEYSTONE Frontend — SRE nginx configuration
# No TLS (Istio sidecar handles mTLS), forwards SSO headers to backend
# =============================================================================

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; font-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Suppress server version token
    server_tokens off;

    # -------------------------------------------------------------------------
    # SPA fallback — serve index.html for client-side routes
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # DNS resolver (must be before locations that use variables in proxy_pass)
    # -------------------------------------------------------------------------
    resolver 10.43.0.10 valid=30s ipv6=off;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # OAuth2 Proxy auth_request endpoint (subrequest to validate session)
    # -------------------------------------------------------------------------
    location = /oauth2/auth {
        internal;
        set $oauth2_upstream "oauth2-proxy.oauth2-proxy.svc.cluster.local";
        proxy_pass http://$oauth2_upstream:4180/oauth2/auth;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        # Must use service FQDN as Host (not $host) so Istio routes correctly
        proxy_set_header Host "oauth2-proxy.oauth2-proxy.svc.cluster.local";
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # -------------------------------------------------------------------------
    # API reverse proxy to backend — auth_request extracts SSO headers
    # -------------------------------------------------------------------------
    location /api/ {
        # Subrequest to OAuth2 Proxy to validate session and extract user info
        auth_request /oauth2/auth;
        auth_request_set $auth_user $upstream_http_x_auth_request_user;
        auth_request_set $auth_email $upstream_http_x_auth_request_email;
        auth_request_set $auth_groups $upstream_http_x_auth_request_groups;
        auth_request_set $auth_preferred $upstream_http_x_auth_request_preferred_username;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward extracted SSO headers to the backend
        proxy_set_header x-auth-request-user $auth_user;
        proxy_set_header x-auth-request-email $auth_email;
        proxy_set_header x-auth-request-groups $auth_groups;
        proxy_set_header x-auth-request-preferred-username $auth_preferred;
    }

    # -------------------------------------------------------------------------
    # Tile proxy — route all tile requests through nginx
    # -------------------------------------------------------------------------

    # OpenStreetMap tiles
    location /tiles/osm/ {
        set $osm_upstream "tile.openstreetmap.org";
        rewrite ^/tiles/osm/(.*) /$1 break;
        proxy_pass https://$osm_upstream;
        proxy_set_header Host tile.openstreetmap.org;
        proxy_set_header User-Agent "KEYSTONE/1.0";
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Esri Satellite tiles
    location /tiles/satellite/ {
        set $esri_upstream "server.arcgisonline.com";
        rewrite ^/tiles/satellite/(.*) /ArcGIS/rest/services/World_Imagery/MapServer/tile/$1 break;
        proxy_pass https://$esri_upstream;
        proxy_set_header Host server.arcgisonline.com;
        proxy_set_header User-Agent "KEYSTONE/1.0";
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # OpenTopoMap tiles
    location /tiles/topo/ {
        set $topo_upstream "a.tile.opentopomap.org";
        rewrite ^/tiles/topo/(.*) /$1 break;
        proxy_pass https://$topo_upstream;
        proxy_set_header Host a.tile.opentopomap.org;
        proxy_set_header User-Agent "KEYSTONE/1.0";
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Nominatim geocoding proxy
    location /geocode/ {
        set $nominatim_upstream "nominatim.openstreetmap.org";
        rewrite ^/geocode/(.*) /$1 break;
        proxy_pass https://$nominatim_upstream;
        proxy_set_header Host nominatim.openstreetmap.org;
        proxy_set_header User-Agent "nginx-proxy";
        proxy_set_header Referer "";
        proxy_ssl_server_name on;
        proxy_cache_valid 200 1h;
        expires 1h;
    }

    # Local tile server (offline MBTiles)
    location /tiles/local/ {
        resolver 10.43.0.10 valid=30s ipv6=off;
        set $tileserver_upstream "tileserver";
        proxy_pass http://$tileserver_upstream:8081/;
        proxy_set_header Host $host;
    }

    # -------------------------------------------------------------------------
    # Deny access to hidden files
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        return 404;
    }
}
