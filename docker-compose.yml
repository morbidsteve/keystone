# =============================================================================
# KEYSTONE — Docker Compose (Development / Production baseline)
# Hardened per DoD Container Hardening Guide
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with PostGIS
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:15-3.4
    platform: linux/amd64
    environment:
      POSTGRES_DB: keystone
      POSTGRES_USER: keystone
      POSTGRES_PASSWORD: keystone_dev
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystone"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    networks:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redisdata:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "keystone_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend API (FastAPI / Uvicorn)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      target: production
    user: "1001:1001"
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://keystone:keystone_dev@db:5432/keystone
      DATABASE_URL_SYNC: postgresql://keystone:keystone_dev@db:5432/keystone
      REDIS_URL: redis://:keystone_redis_dev@redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:8080","http://localhost","https://localhost","https://localhost:443"]'
      ENV_MODE: development
      SIM_ENABLED: "true"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - frontend
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Worker (background tasks)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      target: production
    user: "1001:1001"
    environment:
      DATABASE_URL: postgresql+asyncpg://keystone:keystone_dev@db:5432/keystone
      DATABASE_URL_SYNC: postgresql://keystone:keystone_dev@db:5432/keystone
      REDIS_URL: redis://:keystone_redis_dev@redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: ["celery", "-A", "app.tasks:celery_app", "worker", "--loglevel=info"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks:celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend (nginx serving built SPA)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      target: production    # For SRE/K8s deployment, use target: sre (no SSL, Istio handles TLS)
    ports:
      - "80:8080"
      - "443:8443"
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    networks:
      - frontend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Simulator (mock data generator — demo profile only)
  # ---------------------------------------------------------------------------
  simulator:
    build:
      context: ./backend
      target: production
    user: "1001:1001"
    command: ["python", "-m", "simulator", "run", "--scenario=steel_guardian", "--speed=60", "--url=http://backend:8000"]
    depends_on:
      backend:
        condition: service_healthy
    environment:
      SIM_SPEED: "60"
      SIM_SCENARIO: steel_guardian
      KEYSTONE_URL: http://backend:8000
    profiles:
      - demo
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - backend
    restart: "no"

  # ---------------------------------------------------------------------------
  # Prometheus (monitoring profile)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["monitoring"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Grafana (monitoring profile)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=keystone_grafana_dev
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Database Backup (backup profile)
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:15-alpine
    profiles: ["backup"]
    environment:
      PGHOST: db
      PGUSER: keystone
      PGPASSWORD: keystone_dev
      PGDATABASE: keystone
      BACKUP_DIR: /backups
    volumes:
      - ./scripts/backup-db.sh:/backup.sh:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "-c", "chmod +x /backup.sh && /backup.sh"]
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  grafana_data:
  backup_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
