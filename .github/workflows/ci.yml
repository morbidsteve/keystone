name: KEYSTONE CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  dsop:
    name: DevSecOps Pipeline
    uses: ./.github/workflows/dsop.yml
    with:
      project-name: KEYSTONE
      images: |
        [
          {"name":"backend","context":"backend/","suffix":"keystone-backend","env_var":"BACKEND_IMAGE"},
          {"name":"frontend","context":"frontend/","suffix":"keystone-frontend","env_var":"FRONTEND_IMAGE"}
        ]
      python-version: '3.11'
      node-version: '20'
      backend-path: 'backend/'
      frontend-path: 'frontend/'
      backend-lint-command: >-
        ruff check . --output-format=github &&
        ruff format --check . &&
        mypy app/ --ignore-missing-imports
        --disable-error-code arg-type
        --disable-error-code assignment
        --disable-error-code var-annotated
      frontend-lint-command: 'npx tsc -b'
      backend-test-command: 'pytest tests/ -v --cov=app --cov-report=xml --cov-report=term'
      frontend-test-command: 'npx vitest run --coverage'
      backend-test-deps: 'pytest pytest-cov pytest-asyncio httpx aiosqlite'
      health-endpoint: '/api/v1/health'
      openapi-endpoint: '/api/v1/openapi.json'
      backend-port: 8000
      frontend-port: 8080
      ci-compose-file: 'docker-compose.ci.yml'
      enable-dast: true
      enable-signing: true
      label-namespace: 'io.keystone'
      semgrep-configs: 'p/owasp-top-ten p/cwe-top-25 p/python p/typescript p/react p/sql-injection p/command-injection p/xss'
    secrets: inherit
