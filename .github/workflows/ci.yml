name: KEYSTONE CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/keystone-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/keystone-frontend
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  FAIL_ON_SEVERITY: 'critical'

jobs:
  # ============================================================
  # PHASE 1: CODE QUALITY (all parallel)
  # ============================================================
  lint-backend:
    name: "Lint: Backend (Ruff + mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy
      - run: ruff check backend/ --output-format=github
      - run: ruff format --check backend/
      - name: mypy type check
        run: >
          mypy backend/app/ --ignore-missing-imports
          --disable-error-code arg-type
          --disable-error-code assignment
          --disable-error-code var-annotated

  lint-frontend:
    name: "Lint: Frontend (tsc)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc -b

  sast-scan:
    name: "SAST: Semgrep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Semgrep
        run: pip3 install semgrep
      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/cwe-top-25 \
            --config p/python \
            --config p/typescript \
            --config p/react \
            --config p/sql-injection \
            --config p/command-injection \
            --config p/xss \
            --config .github/policies/semgrep-rules.yml \
            --sarif --output semgrep.sarif \
            . || true
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: sast-semgrep

  secrets-scan:
    name: "Secrets: TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --json

  clamav-scan:
    name: "Malware: ClamAV"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ClamAV
        run: |
          sudo apt-get update && sudo apt-get install -y clamav clamav-daemon
          sudo systemctl stop clamav-freshclam || true
          sudo freshclam || true
      - name: Scan source code
        run: |
          clamscan --recursive --infected --suppress-ok-results \
            --exclude-dir='.git' --exclude-dir='node_modules' \
            --exclude-dir='__pycache__' --exclude-dir='.venv' \
            . | tee clamav-report.txt
          if grep -q "Infected files: 0" clamav-report.txt; then
            echo "No malware detected"
          else
            echo "Malware detected!"
            exit 1
          fi
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clamav-report
          path: clamav-report.txt

  license-check:
    name: "License: Compliance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM for license analysis
        run: syft dir:. -o spdx-json > source-sbom.spdx.json
      - name: Check licenses against policy
        run: |
          python3 -c "
          import json, sys
          sbom = json.load(open('source-sbom.spdx.json'))
          licenses = set()
          for pkg in sbom.get('packages', []):
              lic = pkg.get('licenseConcluded', pkg.get('licenseDeclared', 'NOASSERTION'))
              if lic and lic != 'NOASSERTION':
                  licenses.add(lic)
          blocked = {'GPL-2.0-only', 'GPL-3.0-only', 'AGPL-3.0-only', 'AGPL-3.0-or-later', 'SSPL-1.0', 'EUPL-1.1'}
          flagged = licenses & blocked
          if flagged:
              print(f'BLOCKED licenses found: {flagged}')
              sys.exit(1)
          else:
              print(f'All {len(licenses)} detected licenses are approved')
              for lic in sorted(licenses):
                  print(f'  - {lic}')
          "

  # ============================================================
  # PHASE 2: BUILD & SCAN (depends on Phase 1)
  # ============================================================
  build-backend:
    name: "Build: Backend Image"
    needs: [lint-backend, sast-scan, secrets-scan, clamav-scan, license-check]
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  build-frontend:
    name: "Build: Frontend Image"
    needs: [lint-frontend, sast-scan, secrets-scan, clamav-scan, license-check]
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-backend:
    name: "Scan: Backend Image"
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM (SPDX 2.3)
        run: |
          syft ${{ needs.build-backend.outputs.image-ref }} \
            -o spdx-json=backend-sbom.spdx.json \
            -o cyclonedx-json=backend-sbom.cyclonedx.json
      - uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: |
            backend-sbom.spdx.json
            backend-sbom.cyclonedx.json
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Grype scan
        run: |
          grype sbom:backend-sbom.spdx.json \
            --fail-on ${{ env.FAIL_ON_SEVERITY }} \
            --output json --file grype-backend-report.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-backend-report
          path: grype-backend-report.json
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-backend.outputs.image-ref }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
      - name: Validate container hardening
        run: |
          echo "=== Backend Container Hardening Check ==="
          USER_LINE=$(docker inspect ${{ needs.build-backend.outputs.image-ref }} --format '{{.Config.User}}')
          if [ -z "$USER_LINE" ] || [ "$USER_LINE" = "root" ] || [ "$USER_LINE" = "0" ]; then
            echo "FAIL: Container runs as root (User=$USER_LINE)"
            exit 1
          fi
          echo "PASS: Non-root user: $USER_LINE"
          if docker run --rm --entrypoint="" ${{ needs.build-backend.outputs.image-ref }} /bin/sh -c "echo shell_exists" 2>/dev/null; then
            echo "WARNING: Shell available in image (consider distroless)"
          else
            echo "PASS: No shell in final image (distroless)"
          fi

  scan-frontend:
    name: "Scan: Frontend Image"
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM
        run: |
          syft ${{ needs.build-frontend.outputs.image-ref }} \
            -o spdx-json=frontend-sbom.spdx.json \
            -o cyclonedx-json=frontend-sbom.cyclonedx.json
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: |
            frontend-sbom.spdx.json
            frontend-sbom.cyclonedx.json
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Grype scan
        run: |
          grype sbom:frontend-sbom.spdx.json \
            --fail-on ${{ env.FAIL_ON_SEVERITY }} \
            --output json --file grype-frontend-report.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-frontend-report
          path: grype-frontend-report.json
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-frontend.outputs.image-ref }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
      - name: Validate container hardening
        run: |
          USER_LINE=$(docker inspect ${{ needs.build-frontend.outputs.image-ref }} --format '{{.Config.User}}')
          if [ -z "$USER_LINE" ] || [ "$USER_LINE" = "root" ] || [ "$USER_LINE" = "0" ]; then
            echo "FAIL: Container runs as root"
            exit 1
          fi
          echo "PASS: Non-root user: $USER_LINE"

  # ============================================================
  # PHASE 3: TESTING (depends on Phase 2)
  # ============================================================
  test-backend:
    name: "Test: Backend (pytest)"
    needs: build-backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: keystone_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: keystone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://keystone_test:test_password@localhost:5432/keystone_test
          REDIS_URL: redis://localhost:6379
          TESTING: "true"
        run: cd backend && pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  test-frontend:
    name: "Test: Frontend (Vitest)"
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx vitest run --coverage

  dast-scan:
    name: "DAST: OWASP ZAP"
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start application stack
        env:
          BACKEND_IMAGE: ${{ needs.build-backend.outputs.image-ref }}
          FRONTEND_IMAGE: ${{ needs.build-frontend.outputs.image-ref }}
        run: docker compose -f docker-compose.ci.yml up -d
      - name: Wait for healthy
        env:
          BACKEND_IMAGE: ${{ needs.build-backend.outputs.image-ref }}
          FRONTEND_IMAGE: ${{ needs.build-frontend.outputs.image-ref }}
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 1
          done
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Frontend healthy after ${i}s"
              break
            fi
            sleep 1
          done
      - uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: 'http://localhost:8000/api/v1/openapi.json'
          format: openapi
          cmd_options: '-a -j'
          allow_issue_writing: false
      - uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a'
          allow_issue_writing: false
      - if: always()
        env:
          BACKEND_IMAGE: ${{ needs.build-backend.outputs.image-ref }}
          FRONTEND_IMAGE: ${{ needs.build-frontend.outputs.image-ref }}
        run: docker compose -f docker-compose.ci.yml down -v

  # ============================================================
  # PHASE 4: SIGN & ATTEST (main/tags only)
  # ============================================================
  sign-and-attest:
    name: "Sign & Attest Images"
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [scan-backend, scan-frontend, test-backend, test-frontend, dast-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Cosign
        run: |
          curl -Lo /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x /usr/local/bin/cosign
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-sbom'
          merge-multiple: true
      - name: Sign backend image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ${{ needs.build-backend.outputs.image-ref }}@${{ needs.build-backend.outputs.digest }}
      - name: Attach backend SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --predicate backend-sbom.spdx.json --type spdxjson \
            ${{ needs.build-backend.outputs.image-ref }}@${{ needs.build-backend.outputs.digest }}
      - name: Sign frontend image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ${{ needs.build-frontend.outputs.image-ref }}@${{ needs.build-frontend.outputs.digest }}
      - name: Attach frontend SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --predicate frontend-sbom.spdx.json --type spdxjson \
            ${{ needs.build-frontend.outputs.image-ref }}@${{ needs.build-frontend.outputs.digest }}
      - name: Verify signatures
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ${{ needs.build-backend.outputs.image-ref }}@${{ needs.build-backend.outputs.digest }}
          cosign verify --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ${{ needs.build-frontend.outputs.image-ref }}@${{ needs.build-frontend.outputs.digest }}

  # ============================================================
  # PHASE 5: COMPLIANCE GATE
  # ============================================================
  compliance-gate:
    name: "Compliance: Final Gate"
    needs: [sast-scan, secrets-scan, clamav-scan, license-check, scan-backend, scan-frontend, test-backend, test-frontend, dast-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: scan-results/
      - name: Generate compliance evidence report
        run: |
          cat > scan-results/COMPLIANCE_EVIDENCE.md << EOF
          # KEYSTONE Compliance Evidence Report
          **Generated:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Pipeline Run:** ${{ github.run_id }}

          | Check | Status | Tool |
          |-------|--------|------|
          | SAST | ${{ needs.sast-scan.result }} | Semgrep |
          | Secrets | ${{ needs.secrets-scan.result }} | TruffleHog |
          | Malware | ${{ needs.clamav-scan.result }} | ClamAV |
          | License | ${{ needs.license-check.result }} | Syft |
          | Backend Image Scan | ${{ needs.scan-backend.result }} | Grype + Trivy |
          | Frontend Image Scan | ${{ needs.scan-frontend.result }} | Grype + Trivy |
          | Backend Tests | ${{ needs.test-backend.result }} | pytest |
          | Frontend Tests | ${{ needs.test-frontend.result }} | Vitest |
          | DAST | ${{ needs.dast-scan.result }} | OWASP ZAP |
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence
          path: scan-results/COMPLIANCE_EVIDENCE.md
      - name: Final gate check
        run: |
          FAILED=0
          check_result() {
            if [ "$2" = "failure" ]; then
              echo "FAIL: $1 ($2)"
              FAILED=1
            else
              echo "PASS: $1"
            fi
          }
          echo "======================================"
          echo "  KEYSTONE COMPLIANCE GATE RESULTS"
          echo "======================================"
          check_result "SAST (Semgrep)" "${{ needs.sast-scan.result }}"
          check_result "Secrets (TruffleHog)" "${{ needs.secrets-scan.result }}"
          check_result "Malware (ClamAV)" "${{ needs.clamav-scan.result }}"
          check_result "License Compliance" "${{ needs.license-check.result }}"
          check_result "Backend Image Scan" "${{ needs.scan-backend.result }}"
          check_result "Frontend Image Scan" "${{ needs.scan-frontend.result }}"
          check_result "Backend Tests" "${{ needs.test-backend.result }}"
          check_result "Frontend Tests" "${{ needs.test-frontend.result }}"
          check_result "DAST (ZAP)" "${{ needs.dast-scan.result }}"
          echo "======================================"
          if [ $FAILED -ne 0 ]; then
            echo "PIPELINE BLOCKED - Fix failures above before merge"
            exit 1
          fi
          echo "ALL GATES PASSED - Safe to merge/deploy"
